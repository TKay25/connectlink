    {% if can_edit_projects %}
    <script>window.CAN_EDIT_PROJECTS = true;</script>
    {% else %}
    <script>window.CAN_EDIT_PROJECTS = false;
    // Continuously disable update buttons (handles DataTable re-renders)
    function disableUpdateBtns() {
        document.querySelectorAll('.update-project-btn').forEach(btn => {
            btn.disabled = true;
            btn.style.opacity = '0.5';
            btn.style.cursor = 'not-allowed';
            btn.title = 'No permission to edit projects';
        });
    }
    disableUpdateBtns();
    setInterval(disableUpdateBtns, 2000);
    // Also reapply on DOM changes
    new MutationObserver(disableUpdateBtns).observe(document.body, { childList: true, subtree: true });
    </script>

        /* Toggle Switch for Human/Bot Mode */
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .switch .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 20px;
        }
        .switch .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        .switch input:checked + .slider {
            background-color: var(--bs-success, #28a745);
        }
        .switch input:checked + .slider:before {
            transform: translateX(16px);
        }

        /* ===== BACKGROUND PATTERNS (from mainindex.html) ===== */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }
        .bg-gradient {
            background: linear-gradient(135deg, #e8f0f8 0%, #d4e4f0 35%, #c0d8e8 65%, #e8f0f8 100%);
        }
        .bg-grid {
            background-image: 
                linear-gradient(rgba(10,43,62,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(10,43,62,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .bg-diagonal {
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 40px,
                rgba(10,43,62,0.03) 40px,
                rgba(10,43,62,0.03) 41px
            );
        }
        .bg-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-orbs::before {
            content: '';
            position: absolute;
            top: -15%;
            right: -5%;
            width: 45%;
            height: 60%;
            background: radial-gradient(circle, rgba(181,13,13,0.08) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: floatOrb 20s ease-in-out infinite alternate;
        }
        .bg-orbs::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -5%;
            width: 40%;
            height: 50%;
            background: radial-gradient(circle, rgba(10,43,62,0.08) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: floatOrb 25s ease-in-out infinite alternate-reverse;
        }
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -20px) scale(1.1); }
        }
        .bg-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(10,43,62,0.06) 1px, transparent 1px);
            background-size: 30px 30px;
        }

/* ===== FIXED TOP NAVBAR — Sleek glass-morphism ===== */
.fixed-navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1050;
  background: rgba(30, 41, 59, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(79, 70, 229, 0.15);
  padding: 0 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: var(--nav-height);
}
.fixed-navbar::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 5%;
  width: 90%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  opacity: 0.4;
}
.fixed-navbar .brand {
  display: flex;
  align-items: center;
  gap: 8px;
}
.fixed-navbar .brand img {
  height: 28px;
  width: auto;
  border-radius: 4px;
}
.fixed-navbar .brand span {
  color: white;
  font-weight: 700;
  font-size: 0.75rem;
  letter-spacing: 0.5px;
  background: linear-gradient(90deg, #fff, rgba(255,255,255,0.7));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.fixed-navbar .nav-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}
.fixed-navbar .nav-actions .btn-side {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.65);
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  font-size:0.7rem;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
  position: relative;
}
.fixed-navbar .nav-actions .btn-side:hover {
  background: rgba(255,255,255,0.08);
  color: white;
}
.fixed-navbar .nav-actions .btn-side.active {
  background: rgba(79,70,229,0.2);
  color: white;
}
.fixed-navbar .nav-actions .btn-side.active::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 20%;
  width: 60%;
  height: 2px;
  background: var(--primary);
  border-radius: 2px;
}
.fixed-navbar .nav-actions .btn-side i {
  font-size:0.7rem;
}
.fixed-navbar .user-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.06);
  padding: 2px 10px 2px 6px;
  border-radius: 30px;
  color: rgba(255,255,255,0.85);
  font-size:0.7rem;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.2s;
}
.fixed-navbar .user-badge:hover {
  background: rgba(255,255,255,0.1);
}
.fixed-navbar .user-badge .avatar {
  width: 24px;

  font-weight: 700;

        /* ==================== ENHANCED REACT-LIKE ANIMATIONS ==================== */
        
        /* Page Entry Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Sidebar Animation */
        .sidebar {
            animation: slideInLeft 0.5s ease-out;
        }

        /* Header Animation */
        header {
            animation: fadeInDown 0.4s ease-out;
        }

        /* Staggered Card Animations */
        .summary-card {
            animation: fadeInUp 0.5s ease-out backwards;
        }

        .summary-card:nth-child(1) { animation-delay: 0.2s; }
        .summary-card:nth-child(2) { animation-delay: 0.3s; }
        .summary-card:nth-child(3) { animation-delay: 0.4s; }
        .summary-card:nth-child(4) { animation-delay: 0.5s; }

        /* Graph Card Stagger */
        .graph-card {
            animation: fadeInUp 0.5s ease-out backwards;
        }

        .graph-card:nth-child(1) { animation-delay: 0.3s; }
        .graph-card:nth-child(2) { animation-delay: 0.4s; }
        .graph-card:nth-child(3) { animation-delay: 0.5s; }

        /* Enhanced Card Hover Effects */
        .summary-card {
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .summary-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(155,29,44,0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .summary-card:hover::after {
            opacity: 1;
        }

        .summary-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 12px 30px rgba(155,29,44,0.2);
        }

        /* Graph Card Hover */
        .graph-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .graph-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        /* Button Hover Effects */
        .btn-side {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-side::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.6s ease;
        }

        .btn-side:hover::before {
            left: 100%;

        .sidebar .btn-side {

        /* Stats Grid */
        .stats-grid {

        }

        }
        
        /* Fix for card styling */
        #admin-content .card {
            background: transparent;

        /* Ensure tabs take full width */

    /* ===== REACT-APP POLISH ===== */

    /* --- Toast Notification System --- */
    .toast-container {
        position: fixed;
        top: 70px;
        right: 20px;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
    }
    .toast-notification {
        pointer-events: auto;
        background: linear-gradient(135deg, #FFFFFF 0%, #F8F9FC 100%);
        border: 1px solid rgba(79, 70, 229, 0.15);
        border-left: 4px solid var(--crimson-bright);
        border-radius: 12px;
        padding: 12px 16px;
        min-width: 300px;
        max-width: 420px;
        box-shadow: 0 8px 32px rgba(10, 26, 58, 0.2);
        display: flex;
        align-items: flex-start;
        gap: 12px;
        animation: toastSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        transition: all 0.3s ease;
        color: var(--dark-blue-deep);
        font-size: 0.75rem;
    }
    .toast-notification.toast-exit {
        animation: toastSlideOut 0.3s ease forwards;
    }
    .toast-notification .toast-icon {
        flex-shrink: 0;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
    }
    .toast-notification.toast-success .toast-icon { background: #e8f5e9; color: #2e7d32; }
    .toast-notification.toast-error .toast-icon { background: #fce4ec; color: #c62828; }
    .toast-notification.toast-warning .toast-icon { background: #fff3e0; color: #ef6c00; }
    .toast-notification.toast-info .toast-icon { background: #e3f2fd; color: #1565c0; }
    .toast-notification .toast-content { flex: 1; }
    .toast-notification .toast-title { font-weight: 700; font-size:0.7rem; margin-bottom: 2px; }
    .toast-notification .toast-message { color: #5a678a; font-size:0.7rem; line-height: 1.4; }
    .toast-notification .toast-close {
        flex-shrink: 0;
        background: none;
        border: none;
        color: #9aa4bf;
        cursor: pointer;
        padding: 2px;
        font-size: 0.7rem;
        transition: color 0.2s;
    }
    .toast-notification .toast-close:hover { color: var(--dark-blue-deep); }
    @keyframes toastSlideIn {
        from { transform: translateX(120%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    @keyframes toastSlideOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(120%); opacity: 0; }
    }

    /* --- Skeleton Loading --- */
    .skeleton {
        background: linear-gradient(90deg, #e8ecf4 25%, #f0f2f8 50%, #e8ecf4 75%);
        background-size: 200% 100%;
        animation: skeletonShimmer 1.5s ease-in-out infinite;
        border-radius: 6px;
        display: inline-block;
        height: 1em;
        width: 100%;
    }
    .skeleton-text { height: 12px; margin-bottom: 8px; width: 80%; }
    .skeleton-text.short { width: 50%; }
    .skeleton-text.long { width: 95%; }
    .skeleton-avatar {
        width: 36px; height: 36px; border-radius: 50%;
        flex-shrink: 0;
    }
    .skeleton-button { height: 32px; width: 80px; border-radius: 8px; }
    .skeleton-card {
        height: 80px; border-radius: 16px; margin-bottom: 12px;
    }
    .skeleton-table-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid rgba(79, 70, 229, 0.06);
    }
    .skeleton-table-row .skeleton { height: 14px; }
    @keyframes skeletonShimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
    }

    /* --- Tab Pane Transitions & Scroll --- */
    .tab-pane {
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .tab-pane.active {
        opacity: 1;
        transform: translateY(0);
    }
    .tab-pane.fade {
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .tab-pane.fade.show {
        opacity: 1;
        transform: translateY(0);
    }

    /* --- Scrollable Table Container --- */
    .table-scroll-container {
        max-height: calc(100vh - 280px);
        overflow-y: auto;
        overflow-x: auto;
        border-radius: 8px;
        border: 1px solid rgba(79, 70, 229, 0.08);
    }
    .table-scroll-container table {
        margin-bottom: 0;
    }
    .table-scroll-container::-webkit-scrollbar,
    .container2::-webkit-scrollbar {
        width: 6px;
        height: 6px;
    }
    .table-scroll-container::-webkit-scrollbar-thumb,
    .container2::-webkit-scrollbar-thumb {
        background: rgba(79, 70, 229, 0.2);
        border-radius: 3px;
    }
    .table-scroll-container::-webkit-scrollbar-thumb:hover,
    .container2::-webkit-scrollbar-thumb:hover {
        background: rgba(79, 70, 229, 0.4);
    }
    /* Scrollable table containers inside tab panes - dynamic max-height */
    .tab-pane .container2,
    .tab-pane .table-scroll-container {
        max-height: calc(100vh - 280px);
    }
    /* Inside modals, let the modal body handle scroll */
    .modal-body-custom .container2 {
        max-height: none;
    }

    /* --- Sticky Table Headers (handled by JS to avoid DataTables conflicts) --- */

    /* --- Card Hover Elevation --- */
    .card, .summary-card, .graph-card {
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                    box-shadow 0.3s ease !important;
    }
    .summary-card:hover {
        transform: translateY(-3px) scale(1.01);
        box-shadow: 0 12px 28px rgba(10, 26, 58, 0.15) !important;
    }
    .graph-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(10, 26, 58, 0.12) !important;
    }

    /* --- Enhanced Input Focus --- */
    .form-control:focus, .form-select:focus {
        border-color: var(--crimson-bright) !important;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15) !important;
        background: white !important;
        transition: all 0.25s ease;
    }
    .form-control, .form-select {
        transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    /* --- Badge Polish --- */
    .badge {
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 20px;
        font-size:0.7rem;
        letter-spacing: 0.3px;
        transition: all 0.25s ease;
    }
    .badge.bg-secondary {
        background: linear-gradient(135deg, #e8ecf4 0%, #d5dce8 100%) !important;
        color: #1E2A56 !important;
    }
    .badge.bg-success {
        background: linear-gradient(135deg, #4caf50 0%, #388e3c 100%) !important;
    }
    .badge.bg-warning {
        background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%) !important;
        color: white !important;
    }
    .badge.bg-danger {
        background: linear-gradient(135deg, var(--primary) 0%, #9B1D2C 100%) !important;
    }
    .badge.bg-info {
        background: linear-gradient(135deg, #2196f3 0%, #1565c0 100%) !important;
    }

    /* --- Enhanced Table Row Hover --- */
    .table-theme tbody tr {
        transition: background 0.2s ease, transform 0.15s ease;
    }
    .table-theme tbody tr:hover td {
        background: rgba(79, 70, 229, 0.06) !important;
    }
    .table-theme tbody tr:active td {
        background: rgba(79, 70, 229, 0.12) !important;
    }

    /* --- Modern Scrollbar --- */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
        background: rgba(79, 70, 229, 0.2);
        border-radius: 3px;
        transition: background 0.3s;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(79, 70, 229, 0.4); }

    /* --- Button Ripple Enhancement --- */
    .btn {
        position: relative;
        overflow: hidden;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
    }
    .btn:active {
        transform: scale(0.96) !important;
    }
    .btn .ripple-effect {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        transform: scale(0);
        animation: rippleAnim 0.6s ease-out;
        pointer-events: none;
    }
    @keyframes rippleAnim {
        to { transform: scale(4); opacity: 0; }
    }

    /* --- Loading Spinner Overlay --- */
    .spinner-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(2px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        border-radius: inherit;
        animation: overlayFadeIn 0.2s ease;
    }
    .spinner-overlay .spinner-pulse {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary), #9B1D2C);
        animation: pulseSpin 1.2s ease-in-out infinite;
    }
    @keyframes pulseSpin {
        0%, 100% { transform: scale(0.8); opacity: 0.6; }
        50% { transform: scale(1.2); opacity: 1; }
    }
    @keyframes overlayFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* --- DataTables Integration Polish --- */
    .dataTables_wrapper .dataTables_info {
        color: var(--dark-blue-deep) !important;
        font-size:0.7rem !important;
        padding-top: 8px !important;
    }
    .dataTables_wrapper .dataTables_filter input {
        border: 1px solid rgba(79, 70, 229, 0.2) !important;
        border-radius: 8px !important;
        padding: 4px 8px !important;
        font-size:0.7rem !important;
        background: white !important;
        color: var(--dark-blue-deep) !important;
    }
    .dataTables_wrapper .dataTables_filter input:focus {
        border-color: var(--crimson-bright) !important;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12) !important;
        outline: none !important;
    }

    /* ========================================================================
       REACT-APP COMPONENT LIBRARY
       ======================================================================== */

    /* --- Metric Stat Card --- */
    .stat-card {
        background: white;
        border-radius: var(--radius-md);
        border: 1px solid var(--gray-200);

        display: flex;

    .stat-card .stat-icon {
        width: 40px;
        height: 40px;

    .stat-card .stat-icon.amber { background: #fff3e0; color: #ef6c00; }
    .stat-card .stat-icon.purple { background: #fce8eb; color: #C12B3E; }
    .stat-card .stat-icon.orange { background: #fff3e0; color: #ef6c00; }

    /* --- Info Row (label: value pairs) --- */
    .info-row {
        display: flex;
        align-items: baseline;
        padding: 4px 0;
        border-bottom: 1px solid var(--gray-100);
        gap: 8px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .info-label {
        flex: 0 0 120px;
        font-size:0.7rem;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.2px;
    }
    .info-row .info-value {
        flex: 1;
        font-size:0.7rem;
        font-weight: 500;
        color: var(--text-primary);
        word-break: break-word;
    }

    /* --- Chips / Tags --- */
    .chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;

    .chip i { font-size:0.7rem; }

    .chip.danger { background: #fce4ec; color: #c62828; }
    .chip.warning { background: #fff3e0; color: #ef6c00; }
    .chip.purple { background: #fce8eb; color: #C12B3E; }

    /* --- Empty State --- */
    .empty-state {
        display: flex;

        padding: 40px 20px;

        color: var(--text-secondary);

    .empty-state .empty-desc {

        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        padding: 6px 0;
    }
    .action-toolbar .toolbar-title {

        font-weight: 700;
        color: var(--text-primary);
        flex: 1;
        min-width: 0;
    }
    .action-toolbar .toolbar-spacer { flex: 1; }
